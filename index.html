
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>QMart SIM Scanner</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>
body{font-family:Arial;background:#F0F4F8;margin:0;padding:20px;color:#1A2B3C}
h1{margin-bottom:5px}
.session{background:white;padding:15px;border-radius:10px;margin-bottom:20px;border:1px solid #C8D6E5}
input,select{padding:10px;margin:5px 0;width:100%;font-size:16px}
button{padding:12px 16px;border:none;border-radius:8px;background:#0066CC;color:white;margin:5px;font-size:15px}
button.secondary{background:#E8EEF5;color:#1A2B3C}
#reader{max-width:500px;margin-top:20px}
.log{background:white;border-radius:10px;border:1px solid #C8D6E5;padding:10px;margin-top:20px}
.entry{border-bottom:1px solid #E8EEF5;padding:8px 0;font-size:13px}
.stats{margin-top:15px;font-weight:bold}
</style>
</head>

<body>

<h1>QMart SIM Scanner</h1>
<div id="sessionBox" class="session"></div>

<div class="session">
<label>Box Type</label>
<select id="boxType">
<option value="">Select...</option>
<option value="pallet">Pallet (3000)</option>
<option value="outer">Outer Box (500)</option>
<option value="strip">Strip (10)</option>
</select>

<div id="rangeFields">
<label>First ICCID</label>
<input id="firstICCID">

<label>Last ICCID</label>
<input id="lastICCID">
</div>

<div id="stripField" style="display:none">
<label>Strip Barcode</label>
<input id="stripBarcode">
</div>

<button onclick="scanFirst()">Scan First ICCID</button>
<button onclick="scanLast()">Scan Last ICCID</button>
<button onclick="scanStrip()">Scan Strip</button>

<button onclick="addEntry()">Add Entry</button>

<div id="reader"></div>
</div>

<div class="log">
<h3>Session Log</h3>
<div id="log"></div>
<div class="stats" id="stats"></div>
<button onclick="submitAll()">Submit to Google Sheets</button>
</div>

<script>

let session = JSON.parse(localStorage.getItem("qmart_session")||"null")
let entries = JSON.parse(localStorage.getItem("qmart_entries")||"[]")
let scannedICCIDs = new Set()

const SIM_COUNTS = {pallet:3000, outer:500, strip:10}
const SHEETS_URL = "PASTE_YOUR_APPS_SCRIPT_URL"

let scanner
let targetField=null

init()

function init(){
if(!session){renderSetup()}else{renderSession()}
renderLog()
}

function renderSetup(){
document.getElementById("sessionBox").innerHTML=`
<h3>Start Session</h3>
<input id="name" placeholder="Your name">
<select id="role">
<option value="">Role</option>
<option>RBM</option>
<option>BDM</option>
<option>MDE</option>
</select>
<input id="region" placeholder="Region">
<input id="manager" placeholder="Manager">
<button onclick="startSession()">Start</button>`
}

function startSession(){
session={
name:document.getElementById("name").value,
role:document.getElementById("role").value,
region:document.getElementById("region").value,
manager:document.getElementById("manager").value
}
localStorage.setItem("qmart_session",JSON.stringify(session))
renderSession()
}

function renderSession(){
document.getElementById("sessionBox").innerHTML=`
<b>${session.name}</b> | ${session.role} | ${session.region}
<button class="secondary" onclick="resetSession()">Change</button>`
}

function resetSession(){
localStorage.removeItem("qmart_session")
location.reload()
}

document.getElementById("boxType").addEventListener("change",()=>{
let t=document.getElementById("boxType").value
document.getElementById("rangeFields").style.display=(t==="pallet"||t==="outer")?"block":"none"
document.getElementById("stripField").style.display=(t==="strip")?"block":"block"
})

function startScanner(field){
targetField=field
scanner=new Html5Qrcode("reader")
scanner.start(
{facingMode:"environment"},
{fps:10,qrbox:{width:450,height:120},formatsToSupport:[Html5QrcodeSupportedFormats.CODE_128]},
(code)=>{
scanner.stop()
if(field==="first") document.getElementById("firstICCID").value=code
if(field==="last") document.getElementById("lastICCID").value=code
if(field==="strip") document.getElementById("stripBarcode").value=code
})
}

function scanFirst(){startScanner("first")}
function scanLast(){startScanner("last")}
function scanStrip(){startScanner("strip")}

function addEntry(){

let type=document.getElementById("boxType").value
if(!type){alert("Select box type");return}

if(type==="strip"){
let barcode=document.getElementById("stripBarcode").value
if(scannedICCIDs.has(barcode)){alert("Duplicate strip");return}
scannedICCIDs.add(barcode)
entries.push({type,barcode,qty:SIM_COUNTS[type],session,timestamp:new Date()})
}else{

let first=document.getElementById("firstICCID").value
let last=document.getElementById("lastICCID").value

if(!first||!last){alert("Scan first and last ICCID");return}

if(scannedICCIDs.has(first)||scannedICCIDs.has(last)){
alert("Duplicate SIM batch detected");return
}

scannedICCIDs.add(first)
scannedICCIDs.add(last)

entries.push({type,first,last,qty:SIM_COUNTS[type],session,timestamp:new Date()})
}

localStorage.setItem("qmart_entries",JSON.stringify(entries))
renderLog()
}

function renderLog(){

let log=document.getElementById("log")
log.innerHTML=""
let total=0

entries.forEach(e=>{

let div=document.createElement("div")
div.className="entry"

if(e.type==="strip"){
div.innerHTML=`STRIP | ${e.barcode}`
}else{
div.innerHTML=`${e.type.toUpperCase()} | ${e.first} - ${e.last}`
}

total+=e.qty
log.appendChild(div)

})

document.getElementById("stats").innerHTML="Total SIMs scanned: "+total
}

async function submitAll(){

let payload={entries}

await fetch(SHEETS_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(payload)
})

alert("Submitted to Google Sheets")

entries=[]
localStorage.removeItem("qmart_entries")
renderLog()

}

</script>
</body>
</html>
