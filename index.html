<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QMart SIM Scanner V2</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>
body{font-family:Arial;background:#F0F4F8;margin:0;padding:20px}
h1{color:#0A1628}
button{padding:12px 18px;margin:5px;border:none;background:#0066CC;color:white;border-radius:6px;font-size:16px}
input{padding:10px;font-size:16px;width:100%;margin:5px 0}
#reader{width:100%;max-width:600px;margin-top:20px}
.status{margin-top:10px;font-weight:bold}
.good{color:#00A85A}
.bad{color:#D93025}
</style>
</head>

<body>

<h1>QMart SIM Scanner V2</h1>

<label>First ICCID</label>
<input id="firstICCID">

<label>Last ICCID</label>
<input id="lastICCID">

<label>Strip Barcode</label>
<input id="stripCode">

<label>Calculated Quantity</label>
<input id="qty" readonly>

<button onclick="startScan('first')">Scan First ICCID</button>
<button onclick="startScan('last')">Scan Last ICCID</button>
<button onclick="startScan('strip')">Scan Strip</button>

<div id="reader"></div>
<div id="status" class="status"></div>

<script>

let scanner
let currentTarget = null

const scannedICCIDs = new Set()

function startScan(target){

currentTarget = target

document.getElementById("status").innerText = "Starting camera..."

if(scanner){
scanner.stop().then(()=>{
scanner.clear()
launchScanner()
})
}else{
launchScanner()
}

}

function launchScanner(){

scanner = new Html5Qrcode("reader")

scanner.start(
{ facingMode:"environment" },
{
fps:10,
qrbox:{width:500,height:120},
formatsToSupport:[ Html5QrcodeSupportedFormats.CODE_128 ]
},
onScanSuccess
)

}

function onScanSuccess(decoded){

scanner.stop()

if(currentTarget==="first"){
handleICCID(decoded,"firstICCID")
}

if(currentTarget==="last"){
handleICCID(decoded,"lastICCID")
}

if(currentTarget==="strip"){
document.getElementById("stripCode").value = decoded
}

}

function handleICCID(code,field){

if(scannedICCIDs.has(code)){
showStatus("Duplicate ICCID detected: "+code,true)
return
}

scannedICCIDs.add(code)

document.getElementById(field).value = code

showStatus("Scan successful: "+code,false)

calculateQty()

}

function calculateQty(){

let first = document.getElementById("firstICCID").value
let last = document.getElementById("lastICCID").value

if(first && last){

let f = parseInt(first)
let l = parseInt(last)

if(l>=f){

let qty = (l-f)+1

document.getElementById("qty").value = qty

}else{

showStatus("Last ICCID smaller than First",true)

}

}

}

function showStatus(msg,error){

const el = document.getElementById("status")

el.innerText = msg

if(error){
el.className="status bad"
}else{
el.className="status good"
}

}

</script>

</body>
</html>
